<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label, button {
            padding: 8px;
            margin-top: 5px;
            font-size: 16px;
        }
        input {
            padding: 8px;
            width: 100px;
            font-size: 16px;
        }
        .resultado {
            margin-top: 20px;
        }
        .mensagem {
            margin-top: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h2>Jogo de Adivinhação de Número</h2>
    <p>Eu pensei em um número entre 1 e 50. Tente adivinhar!</p>

    <label for="numero">Digite um número:</label>
    <input type="number" id="numero" name="numero" min="1" max="50">
    <button onclick="adivinharNumero()">Tentar</button>

    <div class="resultado" id="resultado"></div>

    <script>
        // Gerar um número aleatório entre 1 e 100
        let numeroCorreto = Math.floor(Math.random() * 50) + 1;
        let tentativas = 0;

        // Função para verificar a tentativa do usuário
        function adivinharNumero() {
            const numeroDigitado = parseInt(document.getElementById('numero').value);
            const resultadoDiv = document.getElementById('resultado');

            // Incrementa o número de tentativas
            tentativas++;

            // Verifica se o número está dentro do intervalo válido
            if (isNaN(numeroDigitado) || numeroDigitado < 1 || numeroDigitado > 50) {
                resultadoDiv.innerHTML = '<p>Por favor, digite um número entre 1 e 50!</p>';
                return;
            }

            // Verifica se o número adivinhado é o correto
            if (numeroDigitado === numeroCorreto) {
                resultadoDiv.innerHTML = `<p>Parabéns! Você acertou o número ${numeroCorreto} em ${tentativas} tentativas!</p>`;
                // Resetar o jogo
                numeroCorreto = Math.floor(Math.random() * 50) + 1;
                tentativas = 0;
            } else if (numeroDigitado < numeroCorreto) {
                resultadoDiv.innerHTML = `<p>O número é maior! Tente novamente.</p>`;
            } else {
                resultadoDiv.innerHTML = `<p>O número é menor! Tente novamente.</p>`;
            }

            // Limpar o campo de input após a tentativa
            document.getElementById('numero').value = '';
        }
    </script>
</body>
</html>
