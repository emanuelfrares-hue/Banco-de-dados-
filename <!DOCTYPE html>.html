<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cliente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select, button {
            padding: 8px;
            margin-top: 5px;
            width: 100%;
        }
        button {
            background-color: #564caf;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #eff3f0;
        }
        .resultado {
            margin-top: 20px;
            border: 1px solid #ebe5e5;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h2>Formulário de Cadastro de Cliente</h2>
    <form id="formularioCliente">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" required oninput="mascaraTelefone(event)" maxlength="15">

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" required oninput="mascaraCPF(event)">

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" required min="0">

        <label for="sexo">Sexo:</label>
        <select id="sexo" name="sexo" required>
            <option value="">Selecione...</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
            <option value="Outro">Outro</option>
        </select>

        <button type="submit">Enviar</button>
    </form>

    <div class="resultado" id="resultado"></div>

    <script>
        // Função para mascarar o CPF
        function mascaraCPF(event) {
            const cpf = event.target.value.replace(/\D/g, ''); // Remove tudo que não é número
            if (cpf.length <= 11) {
                event.target.value = cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            }
        }

        // Função para mascarar o telefone
        function mascaraTelefone(event) {
            const telefone = event.target.value.replace(/\D/g, ''); // Remove tudo que não é número
            if (telefone.length <= 11) {
                // Formatação para número de telefone
                event.target.value = telefone.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            }
        }

        // Função para lidar com o envio do formulário
        document.getElementById('formularioCliente').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita o envio padrão do formulário

            // Coletar os dados dos campos
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const cpf = document.getElementById('cpf').value;
            const idade = document.getElementById('idade').value;
            const sexo = document.getElementById('sexo').value;

            // Exibir os dados na div "resultado"
            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.innerHTML = `
                <h3>Dados do Cliente:</h3>
                <p><strong>Nome:</strong> ${nome}</p>
                <p><strong>E-mail:</strong> ${email}</p>
                <p><strong>Telefone:</strong> ${telefone}</p>
                <p><strong>CPF:</strong> ${cpf}</p>
                <p><strong>Idade:</strong> ${idade}</p>
                <p><strong>Sexo:</strong> ${sexo}</p>
            `;
        });
    </script>
</body>
</html>
